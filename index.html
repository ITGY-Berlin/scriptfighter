<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="/assets/img/favicon.png">
    <link rel="icon" type="image/png" href="/assets/img/logo.png" sizes="369x196">

    <title>Scriptfighter</title>
    <meta property="og:title" content="Scriptfighter">
    <meta name="author" content="Erfan Nazmehr">
    <meta property="og:locale" content="de_DE">
    <meta name="description" content="Learn coding with fun">
    <meta property="og:description" content="Learn coding with fun">
    <meta property="og:url" content="https://www.scriptfighter.com">
    <meta property="og:site_name" content="Scriptfighter">
    <meta property="og:image" content="/assets/img/logo.png">
    <meta property="og:type" content="article">

    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            color: white;
            font-family: 'Barlow', sans-serif;
        }

        main {
            height: 100%;
            width: 100%;
            max-height: 100%;
            max-width: 100%;
            overflow: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f5ed58;
            text-shadow: -1px 0 #c52e30, 0 1px #c52e30, 1px 0 #c52e30, 0 -1px #c52e30;
        }

        h1 {
            text-align: center;
        }

        .logo {
            max-width: 100%;
            max-height: 100%;
            width: 500px;
        }

        .social-media {
            display: flex;
            align-items: center;
            padding-top: 10px;
        }

        .social-media-icons {
            padding-left: 10px;
        }
    </style>
</head>

<body>
    <main>
        <img class="logo" src="assets/img/logo.svg" />
        <h1>Under construction</h1>

        <div>
            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="margin:auto;display:block;" width="200px" height="200px" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid">
                <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="0" y2="100%">
                    <stop offset="0%" style="stop-color:#F7F451;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#D7753B;stop-opacity:1" />
                </linearGradient>
                </defs>
                <circle cx="50" cy="23" r="13" fill="url(#grad1)">
                  <animate attributeName="cy" dur="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.9 0.55;0 0.45 0.55 0.9" keyTimes="0;0.5;1" values="23;77;23"></animate>
                </circle>
            </svg>
        </div>
        <div class="social-media">
            <span>Powerd by</span>
            <a class="social-media-icons" href="https://itgy.de"><img width="80px" src="assets/icons/itgy-logo.svg"></a>
        </div>
        <div class="social-media">
            <span>Stay connected</span>
            <a class="social-media-icons" href="https://www.facebook.com/itgyBerlin/"><img class="social-media-icons" height="24px" src="assets/icons/facebook.svg" /></a>
            <a class="social-media-icons" href="https://github.com/itgy-berlin"><img class="social-media-icons" height="24px" src="assets/icons/github.svg" /></a>
            <a class="social-media-icons" href="https://www.linkedin.com/company/itgy/"><img class="social-media-icons" height="24px" src="assets/icons/linkedin.svg" /></a>
            <a class="social-media-icons" href="https://www.instagram.com/itgy.de"><img class="social-media-icons" height="24px" src="assets/icons/instagram.svg" /></a>
        </div>
    </main>
</body>

</html>
